              $ref: "#/components/schemas/OrgMappingRequest"
      responses:
        "200":
          description: Mapping created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgMapping"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/github/org-mappings/{id}:
