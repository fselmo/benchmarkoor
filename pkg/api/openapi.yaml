  /admin/github/user-mappings/{id}:
    delete:
      operationId: deleteUserMapping
      tags: [admin]
      summary: Delete a user role mapping
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Mapping deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Mapping not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/indexer/run:
    post:
      operationId: runIndexer
      tags: [admin]
      summary: Trigger an immediate indexing pass
      description: Starts an indexing pass. Returns 409 if one is already in progress.
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "202":
          description: Indexing started
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: started
                  message:
                    type: string
                    example: Indexing pass started
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Indexing already in progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: already_running
                  message:
                    type: string
                    example: Indexing pass already in progress

# ── Components ──────────────────────────────────────────────────────
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: benchmarkoor_session
    bearerAuth:
      type: http
      scheme: bearer
      description: API key prefixed with `bmk_`

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    StatusOk:
      type: object
      properties:
        status:
          type: string
          example: ok

    # ── Auth schemas ────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserResponse"

    UserResponse:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [admin, readonly]
        source:
          type: string
          enum: [config, admin, github]

    CreateAPIKeyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        expires_at:
          type: string
          format: date-time
          nullable: true

    CreateAPIKeyResponse:
      type: object
      properties:
        key:
          type: string
          description: "Full API key (only returned on creation): bmk_<64-hex-chars>"
        api_key:
          $ref: "#/components/schemas/APIKeyResponse"

    APIKeyResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        key_prefix:
          type: string
          description: First 8 hex characters of the key for display
        user_id:
          type: integer
        expires_at:
          type: string
          format: date-time
          nullable: true
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    AdminAPIKeyResponse:
      allOf:
        - $ref: "#/components/schemas/APIKeyResponse"
        - type: object
          properties:
            username:
              type: string

    SessionResponse:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        username:
          type: string
        source:
          type: string
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        last_active_at:
          type: string
          format: date-time
          nullable: true

    # ── Admin schemas ───────────────────────────────────────────────
    CreateUserRequest:
      type: object
      required: [username, password, role]
      properties:
        username:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, readonly]

    UpdateUserRequest:
      type: object
      properties:
        password:
          type: string
        role:
          type: string
          enum: [admin, readonly]

    OrgMapping:
      type: object
      properties:
        id:
          type: integer
        org:
          type: string
        role:
          type: string
          enum: [admin, readonly]

    OrgMappingRequest:
      type: object
      required: [org, role]
      properties:
        org:
          type: string
        role:
          type: string
          enum: [admin, readonly]

    UserMapping:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [admin, readonly]

    UserMappingRequest:
      type: object
      required: [username, role]
      properties:
        username:
          type: string
        role:
          type: string
          enum: [admin, readonly]

    # ── Config schema ───────────────────────────────────────────────
    ConfigResponse:
      type: object
      properties:
        auth:
          type: object
          properties:
            basic_enabled:
              type: boolean
            github_enabled:
              type: boolean
            anonymous_read:
              type: boolean
        storage:
          type: object
          properties:
            s3:
              type: object
              properties:
                enabled:
                  type: boolean
                discovery_paths:
                  type: array
                  items:
                    type: string
            local:
              type: object
              properties:
                enabled:
                  type: boolean
                discovery_paths:
                  type: array
                  items:
                    type: string
        indexing:
          type: object
          properties:
            enabled:
              type: boolean

    # ── Index schemas ───────────────────────────────────────────────
    IndexResponse:
      type: object
      properties:
        generated:
          type: integer
          format: int64
          description: Unix timestamp of when the index was generated
        entries:
          type: array
          items:
            $ref: "#/components/schemas/IndexEntry"

    IndexEntry:
      type: object
      properties:
        discovery_path:
          type: string
        run_id:
          type: string
        timestamp:
          type: integer
          format: int64
        timestamp_end:
          type: integer
          format: int64
        suite_hash:
          type: string
        status:
          type: string
        termination_reason:
          type: string
        instance:
          type: object
          properties:
            id:
              type: string
            client:
              type: string
            image:
              type: string
            rollback_strategy:
              type: string
        tests:
          type: object
          properties:
            tests_total:
              type: integer
            tests_passed:
              type: integer
            tests_failed:
              type: integer
            steps:
              type: object
              properties:
                setup:
                  $ref: "#/components/schemas/StepStats"
                test:
                  $ref: "#/components/schemas/StepStats"
                cleanup:
                  $ref: "#/components/schemas/StepStats"

    StepStats:
      type: object
      properties:
        success:
          type: integer
        fail:
          type: integer
        duration:
          type: integer
          format: int64
        gas_used:
          type: integer
          format: uint64
        gas_used_duration:
          type: integer
          format: int64
        resource_totals:
          $ref: "#/components/schemas/ResourceTotals"

    ResourceTotals:
      type: object
      properties:
        cpu_usec:
          type: integer
          format: uint64
        memory_bytes:
          type: integer
          format: uint64
        memory_delta:
          type: integer
          format: int64
        disk_read_bytes:
          type: integer
          format: uint64
        disk_write_bytes:
          type: integer
          format: uint64
        disk_read_iops:
          type: integer
          format: uint64
        disk_write_iops:
          type: integer
          format: uint64

    SuiteStatsResponse:
      type: object
      additionalProperties:
        type: object
        properties:
          durations:
            type: array
            items:
              $ref: "#/components/schemas/RunDuration"

    RunDuration:
      type: object
      properties:
        id:
          type: string
        client:
          type: string
        gas_used:
          type: integer
          format: uint64
        time_ns:
          type: integer
          format: int64
        run_start:
          type: integer
          format: int64
        run_end:
          type: integer
          format: int64
        steps:
          type: object
          properties:
            setup:
              $ref: "#/components/schemas/StepDuration"
            test:
              $ref: "#/components/schemas/StepDuration"
            cleanup:
              $ref: "#/components/schemas/StepDuration"

    StepDuration:
      type: object
      properties:
        gas_used:
          type: integer
          format: uint64
        time_ns:
          type: integer
          format: int64

    # ── Query schemas ───────────────────────────────────────────────
    QueryResultRuns:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/RunResponse"
        total:
          type: integer
          format: int64
        limit:
          type: integer
        offset:
          type: integer

    RunResponse:
      type: object
      properties:
        id:
          type: integer
        discovery_path:
          type: string
        run_id:
          type: string
        timestamp:
          type: integer
          format: int64
        timestamp_end:
          type: integer
          format: int64
        suite_hash:
          type: string
        status:
          type: string
        termination_reason:
          type: string
        has_result:
          type: boolean
        instance_id:
          type: string
        client:
          type: string
        image:
          type: string
        rollback_strategy:
          type: string
        tests_total:
          type: integer
        tests_passed:
          type: integer
        tests_failed:
          type: integer
        steps_json:
          type: object
          description: Raw step statistics JSON
        indexed_at:
          type: string
          format: date-time
        reindexed_at:
          type: string
          format: date-time
          nullable: true

    QueryResultTestStats:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TestStatResponse"
        total:
          type: integer
          format: int64
        limit:
          type: integer
        offset:
          type: integer

    QueryResultTestStatsBlockLogs:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TestStatsBlockLogResponse"
        total:
          type: integer
          format: int64
        limit:
          type: integer
        offset:
          type: integer

    TestStatResponse:
      type: object
      properties:
        id:
          type: integer
        suite_hash:
          type: string
        test_name:
          type: string
        run_id:
          type: string
        client:
          type: string
        total_gas_used:
          type: integer
          format: uint64
        total_time_ns:
          type: integer
          format: int64
        total_mgas_s:
          type: number
          format: double
        setup_gas_used:
          type: integer
          format: uint64
        setup_time_ns:
          type: integer
          format: int64
        setup_mgas_s:
          type: number
          format: double
        test_gas_used:
          type: integer
          format: uint64
        test_time_ns:
          type: integer
          format: int64
        test_mgas_s:
          type: number
          format: double
        run_start:
          type: integer
          format: int64
        run_end:
          type: integer
          format: int64
        steps_json:
          type: object
          description: Raw step duration JSON

    TestStatsBlockLogResponse:
      type: object
      properties:
        id:
          type: integer
        suite_hash:
          type: string
        run_id:
          type: string
        test_name:
          type: string
        client:
          type: string
        block_number:
          type: integer
          format: uint64
        block_hash:
          type: string
        block_gas_used:
          type: integer
          format: uint64
        block_tx_count:
          type: integer
        timing_execution_ms:
          type: number
          format: double
        timing_state_read_ms:
          type: number
          format: double
        timing_state_hash_ms:
          type: number
          format: double
        timing_commit_ms:
          type: number
          format: double
        timing_total_ms:
          type: number
          format: double
        throughput_mgas_per_sec:
          type: number
          format: double
