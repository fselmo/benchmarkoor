          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/api-keys:
    get:
      operationId: listAllAPIKeys
      tags: [admin]
      summary: List all API keys (all users)
      security:
        - cookieAuth: []
        - bearerAuth: []
