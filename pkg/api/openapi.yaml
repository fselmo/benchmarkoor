          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: upsertOrgMapping
      tags: [admin]
      summary: Create or update an org role mapping
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
