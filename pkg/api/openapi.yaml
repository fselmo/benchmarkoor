openapi: 3.0.3
info:
  title: Benchmarkoor API
  description: |
    API for the Benchmarkoor Ethereum execution client benchmarking tool.

    ## Authentication

    Most endpoints require authentication via either:
    - **Session cookie** (`benchmarkoor_session`) — obtained by logging in via `/auth/login` or GitHub OAuth
    - **Bearer token** — an API key prefixed with `bmk_`, passed in the `Authorization: Bearer <key>` header

    Endpoints under `/admin` additionally require the `admin` role.

    ## PostgREST-style Query Endpoints

    The `/index/query/*` endpoints support PostgREST-style filtering:
    - **Filtering:** Add query parameters in the form `column=operator.value` (e.g. `client=eq.geth`, `tests_total=gt.10`)
    - **Operators:** `eq`, `neq`, `gt`, `gte`, `lt`, `lte`, `like`, `in`, `is`
    - **Sorting:** `order=column.asc` or `order=column.desc` (comma-separated for multiple)
    - **Pagination:** `limit` and `offset`
    - **Column selection:** `select=col1,col2`
  version: 1.0.0

servers:
  - url: /api/v1

tags:
  - name: public
    description: Unauthenticated endpoints
  - name: auth
    description: Authentication and session management
  - name: files
    description: File serving (S3 presigned URLs or local)
  - name: index
    description: Indexed run and test duration data
  - name: admin
    description: Admin-only user, session, and mapping management

security: []

paths:
  # ── Public ──────────────────────────────────────────────────────────
  /health:
    get:
      operationId: getHealth
      tags: [public]
      summary: Health check
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"

  /config:
    get:
      operationId: getConfig
      tags: [public]
      summary: Public configuration
      description: Returns authentication providers, storage settings, and indexing status.
      responses:
        "200":
          description: Current public configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigResponse"

  /openapi.json:
    get:
      operationId: getOpenAPISpec
      tags: [public]
      summary: OpenAPI specification
      description: Returns this OpenAPI spec as JSON.
      responses:
        "200":
          description: OpenAPI 3.0 spec
          content:
            application/json:
              schema:
                type: object

  # ── Auth ────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      description: Authenticates a user and sets a session cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
                example: benchmarkoor_session=abc123; Path=/; HttpOnly
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Destroy current session
      description: Clears the session cookie and invalidates the session.
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/api-keys:
    post:
      operationId: createAPIKey
      tags: [auth]
      summary: Create an API key
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyRequest"
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAPIKeyResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listMyAPIKeys
      tags: [auth]
      summary: List your API keys
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: List of API keys owned by the current user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APIKeyResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/api-keys/{id}:
    delete:
      operationId: deleteMyAPIKey
      tags: [auth]
      summary: Delete one of your API keys
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: API key deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: API key not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/github:
    get:
      operationId: githubAuth
      tags: [auth]
      summary: Initiate GitHub OAuth flow
      description: Redirects the user to GitHub for authentication.
      responses:
        "302":
          description: Redirect to GitHub

  /auth/github/callback:
    get:
      operationId: githubCallback
      tags: [auth]
      summary: GitHub OAuth callback
      description: Handles the OAuth callback from GitHub and sets a session cookie.
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to UI after successful authentication

  # ── Files ───────────────────────────────────────────────────────────
  /files/{path}:
    get:
      operationId: getFile
      tags: [files]
      summary: Serve a file from storage
      description: |
        With S3 storage, returns a JSON object containing a presigned URL.
        With local storage, streams the file content directly.
        Requires authentication unless `anonymous_read` is enabled.
      security:
        - cookieAuth: []
        - bearerAuth: []
        - {}
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: File path relative to a discovery path (e.g. `results/index.json`)
      responses:
        "200":
          description: File content or presigned URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    description: Presigned S3 URL (S3 mode only)
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    head:
      operationId: headFile
      tags: [files]
      summary: Check if a file exists
      security:
        - cookieAuth: []
        - bearerAuth: []
        - {}
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File exists
        "404":
          description: File not found

  # ── Index ───────────────────────────────────────────────────────────
  /index/:
    get:
      operationId: listIndexedRuns
      tags: [index]
      summary: List all indexed runs
      description: |
        Returns all indexed runs across all discovery paths, sorted by
        timestamp descending. Same shape as `index.json` with an additional
        `discovery_path` field per entry.
      security:
        - cookieAuth: []
        - bearerAuth: []
        - {}
      responses:
        "200":
          description: Index listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /index/suites/{hash}/stats:
    get:
      operationId: getSuiteStats
      tags: [index]
      summary: Per-test duration statistics for a suite
      description: Returns the same shape as `stats.json`. Durations are sorted by `time_ns` descending.
      security:
        - cookieAuth: []
        - bearerAuth: []
        - {}
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
          description: Suite hash
      responses:
        "200":
          description: Suite statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuiteStatsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /index/query/runs:
    get:
      operationId: queryRuns
      tags: [index]
      summary: Query indexed runs
      description: |
        Query indexed runs with PostgREST-style filtering, sorting, and pagination.

        **Filter columns:** id, discovery_path, run_id, timestamp, timestamp_end,
        suite_hash, status, termination_reason, has_result, instance_id, client,
        image, rollback_strategy, tests_total, tests_passed, tests_failed,
        indexed_at, reindexed_at

        **Filter format:** `column=operator.value` (e.g. `client=eq.geth`)
      security:
        - cookieAuth: []
        - bearerAuth: []
        - {}
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
          description: Maximum number of results
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Number of results to skip
        - name: select
          in: query
          schema:
            type: string
          description: Comma-separated list of columns to return
        - name: order
          in: query
          schema:
            type: string
          description: "Comma-separated sort directives (e.g. `timestamp.desc,client.asc`)"
      responses:
        "200":
          description: Query results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResultRuns"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /index/query/test_stats:
    get:
      operationId: queryTestStats
      tags: [index]
      summary: Query test stat data
      description: |
        Query test stat data with PostgREST-style filtering, sorting, and pagination.

        **Filter columns:** id, suite_hash, test_name, run_id, client,
        total_gas_used, total_time_ns, total_mgas_s, setup_gas_used,
        setup_time_ns, setup_mgas_s, test_gas_used, test_time_ns,
        test_mgas_s, run_start, run_end
      security:
        - cookieAuth: []
        - bearerAuth: []
        - {}
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
          description: Maximum number of results
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Number of results to skip
        - name: select
          in: query
          schema:
            type: string
          description: Comma-separated list of columns to return
        - name: order
          in: query
          schema:
            type: string
          description: "Comma-separated sort directives (e.g. `total_time_ns.desc`)"
      responses:
        "200":
          description: Query results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResultTestStats"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /index/query/test_stats_block_logs:
    get:
      operationId: queryTestStatsBlockLogs
      tags: [index]
      summary: Query test stats block log data
      description: |
        Query per-block log data with PostgREST-style filtering, sorting, and pagination.
      security:
        - cookieAuth: []
        - bearerAuth: []
        - {}
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
          description: Maximum number of results
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Number of results to skip
        - name: select
          in: query
          schema:
            type: string
          description: Comma-separated list of columns to return
        - name: order
          in: query
          schema:
            type: string
          description: "Comma-separated sort directives (e.g. `timing_total_ms.desc`)"
      responses:
        "200":
          description: Query results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResultTestStatsBlockLogs"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Admin ───────────────────────────────────────────────────────────
  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all users
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createUser
      tags: [admin]
      summary: Create a user
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{id}:
    put:
      operationId: updateUser
      tags: [admin]
      summary: Update a user
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteUser
      tags: [admin]
      summary: Delete a user
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/sessions:
